services:
  postgres:
    image: postgres:16
    container_name: ptmk-postgres
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: ptmk
      POSTGRES_PASSWORD: "123"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptmk -d db"]
      interval: 5s
      timeout: 3s
      retries: 10

  goose:
    image: ghcr.io/kukymbr/goose-docker:3.27.1
    container_name: ptmk-goose
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ptmk:123@postgres:5432/db?sslmode=disable
      GOOSE_MIGRATION_DIR: /migrations
    volumes:
      - ./migrations:/migrations:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ptmk-service
    depends_on:
      goose:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ptmk:123@postgres:5432/db?sslmode=disable
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
